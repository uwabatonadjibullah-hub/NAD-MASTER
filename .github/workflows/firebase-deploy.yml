name: Deploy to Firebase on Merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_AI_API }}
          VITE_GOOGLE_DRIVE_API_KEY: ${{ secrets.BROWSER_KEY }}
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NADMASTERPA }}
          channelId: live
          projectId: nadmasterpa
      - name: Deploy Firestore Rules
        run: npx -y firebase-tools@latest deploy --only firestore:rules --project nadmasterpa --token "${{ secrets.FIREBASE_TOKEN }}"
